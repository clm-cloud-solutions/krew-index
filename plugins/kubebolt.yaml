# This is the TEMPLATE for the krew plugin manifest.
#
# Placeholders are replaced by the release workflow:
#   1.4.0          - Tag without v prefix (e.g., 1.2.3)
#   __SHA_*_TGZ__        - SHA256 of each tar.gz archive
#
# Users install with:
#   # Option A (after upstream acceptance):
#   kubectl krew install kubebolt
#
#   # Option B (custom index, before upstream acceptance):
#   kubectl krew index add clm https://github.com/clm-cloud-solutions/krew-index.git
#   kubectl krew install clm/kubebolt
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubebolt
spec:
  version: v1.4.0
  homepage: https://github.com/clm-cloud-solutions/kubebolt
  shortDescription: "Instant Kubernetes monitoring — full cluster visibility in under 2 minutes"
  description: |
    KubeBolt gives you full cluster visibility in under 2 minutes.
    No agents, no Prometheus, no configuration. 23 resource views,
    interactive cluster topology map, 12-rule insights engine,
    and built-in AI copilot.

    Run `kubectl kubebolt` to start the dashboard on http://localhost:8080.
  caveats: |
    This plugin starts a local web server with the KubeBolt dashboard.
    Open the URL printed on stdout in your browser.
    Press Ctrl+C to stop.

    On first boot, an admin password is generated and printed to logs.
    Override with the KUBEBOLT_ADMIN_PASSWORD env var or a .env file.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.4.0/kubebolt-darwin-arm64.tar.gz
      sha256: 362bbff5e7393431f57f2cebd2b75b3e05daee2b7d3978a8dd7ccf6bf142f505
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.4.0/kubebolt-darwin-amd64.tar.gz
      sha256: de74416a6e447a1cf0752227f45e382de5b2a288587cc17c41bda0d246a26eb1
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.4.0/kubebolt-linux-arm64.tar.gz
      sha256: 6c62d41c550f281f3f8570b74f7a8ca0a73295726e131d1c8dc118ff848910b6
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.4.0/kubebolt-linux-amd64.tar.gz
      sha256: c898df23b52e4e458ecc5f98dd7628f6e79a7588ab37d9f453bb4ef86fa91506
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.4.0/kubebolt-windows-amd64.zip
      sha256: 8daa310ff7a60f5d9f8447b1f10eab9e2c2691697091b5083b4156687e6fb80b
      bin: kubectl-kubebolt.exe
