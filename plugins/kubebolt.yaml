# This is the TEMPLATE for the krew plugin manifest.
#
# Placeholders are replaced by the release workflow:
#   1.6.0          - Tag without v prefix (e.g., 1.2.3)
#   __SHA_*_TGZ__        - SHA256 of each tar.gz archive
#
# Users install with:
#   # Option A (after upstream acceptance):
#   kubectl krew install kubebolt
#
#   # Option B (custom index, before upstream acceptance):
#   kubectl krew index add clm https://github.com/clm-cloud-solutions/krew-index.git
#   kubectl krew install clm/kubebolt
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubebolt
spec:
  version: v1.6.0
  homepage: https://github.com/clm-cloud-solutions/kubebolt
  shortDescription: "Instant Kubernetes monitoring — full cluster visibility in under 2 minutes"
  description: |
    KubeBolt gives you full cluster visibility in under 2 minutes.
    No agents, no Prometheus, no configuration. 23 resource views,
    interactive cluster topology map, 12-rule insights engine,
    and built-in AI copilot.

    Run `kubectl kubebolt` to start the dashboard on http://localhost:8080.
  caveats: |
    This plugin starts a local web server with the KubeBolt dashboard.
    Open the URL printed on stdout in your browser.
    Press Ctrl+C to stop.

    On first boot, an admin password is generated and printed to logs.
    Override with the KUBEBOLT_ADMIN_PASSWORD env var or a .env file.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.6.0/kubebolt-darwin-arm64.tar.gz
      sha256: 9545b4759922fcf2b947cf9bcc1db1ecf545c11d09e01ad3263118c51b05fd2c
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.6.0/kubebolt-darwin-amd64.tar.gz
      sha256: bf5f597ec5a783d450f6672ec79a00c56f1e206ff5d567cd0387af31a4de131d
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.6.0/kubebolt-linux-arm64.tar.gz
      sha256: 8367265b6ec6888e79fbe5b62eeddace008689a1d76e5e340eae146144288f9d
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.6.0/kubebolt-linux-amd64.tar.gz
      sha256: b3b02c1af915282ab1e39ce8c1bbec681a8581e464d8cc5c2f856171aacc4981
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.6.0/kubebolt-windows-amd64.zip
      sha256: 64d05b589766f8c5f0db2b8af5666c6a96ca49eb85c59e9ccec26f7c340130eb
      bin: kubectl-kubebolt.exe
