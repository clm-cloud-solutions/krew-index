# This is the TEMPLATE for the krew plugin manifest.
#
# Placeholders are replaced by the release workflow:
#   1.5.1          - Tag without v prefix (e.g., 1.2.3)
#   __SHA_*_TGZ__        - SHA256 of each tar.gz archive
#
# Users install with:
#   # Option A (after upstream acceptance):
#   kubectl krew install kubebolt
#
#   # Option B (custom index, before upstream acceptance):
#   kubectl krew index add clm https://github.com/clm-cloud-solutions/krew-index.git
#   kubectl krew install clm/kubebolt
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: kubebolt
spec:
  version: v1.5.1
  homepage: https://github.com/clm-cloud-solutions/kubebolt
  shortDescription: "Instant Kubernetes monitoring — full cluster visibility in under 2 minutes"
  description: |
    KubeBolt gives you full cluster visibility in under 2 minutes.
    No agents, no Prometheus, no configuration. 23 resource views,
    interactive cluster topology map, 12-rule insights engine,
    and built-in AI copilot.

    Run `kubectl kubebolt` to start the dashboard on http://localhost:8080.
  caveats: |
    This plugin starts a local web server with the KubeBolt dashboard.
    Open the URL printed on stdout in your browser.
    Press Ctrl+C to stop.

    On first boot, an admin password is generated and printed to logs.
    Override with the KUBEBOLT_ADMIN_PASSWORD env var or a .env file.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.5.1/kubebolt-darwin-arm64.tar.gz
      sha256: b26b10692a6f81695ec34af130425a1086c0842319c6a099dd5a43831f3b27db
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.5.1/kubebolt-darwin-amd64.tar.gz
      sha256: f42243a5ac5183350d59620313749eba55631fc202fedcdddc37f301e7d16547
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.5.1/kubebolt-linux-arm64.tar.gz
      sha256: 79f30e7ff16cb8dd10380ded67e5ac5afca07b599bfbde0946b403134003cf90
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.5.1/kubebolt-linux-amd64.tar.gz
      sha256: 1a693ff42bb11a98997379e16ea02d1ea4e2dd4fe2b37a03c4012e718623f223
      bin: kubectl-kubebolt
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/clm-cloud-solutions/kubebolt/releases/download/v1.5.1/kubebolt-windows-amd64.zip
      sha256: 4a3d8cadfffa65298d81c28d4fe65dcabb4fcdd43b599fb5009bba9ad08f7035
      bin: kubectl-kubebolt.exe
